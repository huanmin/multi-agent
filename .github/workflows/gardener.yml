name: Gardener Agent

on:
  schedule:
    # 每天凌晨2点执行
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'scan'
        type: choice
        options:
          - scan
          - cleanup
          - report
      dry_run:
        description: 'Dry run mode'
        required: false
        default: 'true'
        type: boolean

env:
  NODE_VERSION: '20'

jobs:
  gardener:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Gardener Agent
        id: gardener
        run: |
          npm run gardener:${{ github.event.inputs.action || 'scan' }} > gardener-report.md
          echo "report_path=gardener-report.md" >> $GITHUB_OUTPUT
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run || 'true' }}

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: gardener-report
          path: gardener-report.md
          retention-days: 30

      - name: Create Issue if Health Score Low
        if: steps.gardener.outputs.health_score < 80
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('gardener-report.md', 'utf8');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🧹 Gardener Alert: Low Health Score Detected',
              body: `## Health Score Alert\n\nThe Gardener Agent has detected a low health score.\n\n${report}`,
              labels: ['gardener', 'maintenance', 'automated']
            });

      - name: Post Metrics
        if: always()
        run: |
          npm run gardener:metrics > metrics.txt || true
          cat metrics.txt

  # 每周深度清理
  deep-clean:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' && github.event.schedule == '0 3 * * 0'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Run Deep Clean
        run: npm run gardener:cleanup -- --deep
        continue-on-error: true

      - name: Generate Report
        run: npm run gardener:report

      - name: Archive Old Files
        run: |
          mkdir -p archive
          find . -name "*.old" -o -name "*.bak" -mtime +30 -exec mv {} archive/ \;
        continue-on-error: true