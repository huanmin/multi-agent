global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'multi-agent-monitor'

rule_files:
  - /etc/prometheus/alerts/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

scrape_configs:
  # OpenTelemetry Collector
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8889']

  # Prometheus 自身
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Agent 服务
  - job_name: 'agents'
    static_configs:
      - targets: ['host.docker.internal:8080']
    metrics_path: /metrics

  # Gardener Agent
  - job_name: 'gardener'
    static_configs:
      - targets: ['host.docker.internal:8081']
    metrics_path: /metrics